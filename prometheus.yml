global:
  scrape_interval: 15s

scrape_configs:

  # ✅ Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # ❌ Airflow (this will NOT work yet, explained below)
  # - job_name: 'airflow'
  #   static_configs:
  #     - targets: ['airflow-webserver:8080']

  # ❌ Superset (no metrics endpoint by default)
  # - job_name: 'superset'
  #   static_configs:
  #     - targets: ['superset:8088']

  # ✅ StatsD exporter (THIS is your real metrics source)
  - job_name: 'statsd'
    static_configs:
      - targets: ['statsd-exporter:9102']

