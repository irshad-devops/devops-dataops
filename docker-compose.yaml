version: "3.8"

x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor

    # ❗ No hardcoded DB
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ""

    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@cloudsql-proxy:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0

    AIRFLOW__CORE__FERNET_KEY: 'S_R_6hyp1PKFh3iP1N4OeunOCjCFnIuP41fEAtD64BA='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    AIRFLOW__SECRETS__BACKEND: airflow.providers.hashicorp.secrets.vault.VaultBackend
    AIRFLOW__SECRETS__BACKEND_KWARGS: '{"url": "http://vault:8200", "token": "root"}'

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
    - ./config:/opt/airflow/config

  depends_on:
    redis:
      condition: service_healthy

services:

  # 🔴 Cloud SQL Proxy (MAIN DB CONNECTION)
  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.1.0
    container_name: cloudsql-proxy
    command: >
      --address 0.0.0.0
      --port 5432
      marwat-project:us-central1:flight-db-instance
      --credentials-file=/config/gcp-key.json
    volumes:
      - ./config/gcp-key.json:/config/gcp-key.json
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  # 🔐 Vault (Persistent)
  vault:
    image: hashicorp/vault:1.13.3
    container_name: airflow-vault
    ports:
      - "8200:8200"
    volumes:
      - ./vault-data:/vault/file
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    command: >
      vault server -dev
      -dev-root-token-id=root
      -dev-listen-address=0.0.0.0:8200

  # 📊 Monitoring Stack
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki
    ports:
      - "3100:3100"

  # 📈 Superset
  superset:
    image: apache/superset
    ports:
      - "8088:8088"

  # 🚀 Airflow Services
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    command: celery worker

  airflow-init:
    <<: *airflow-common
    entrypoint: bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create \
      --username admin \
      --password admin \
      --role Admin \
      --email admin@example.com
      "

volumes:
  vault-data:
