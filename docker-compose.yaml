version: "3.8"

services:

  # 🔴 Cloud SQL Proxy
  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.1.0
    container_name: cloudsql-proxy
    user: "0:0"
    command:
      - "--credentials-file=/config/gcp-key.json"
      - "--address=0.0.0.0"
      - "--port=5432"
      - "marwat-project:us-central1:flight-db-instance"
    volumes:
      - ./config/gcp-key.json:/config/gcp-key.json:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "/cloud-sql-proxy", "--version"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🔴 Redis
  redis:
    image: redis:7.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🔐 Vault
  vault:
    image: hashicorp/vault:1.13.3
    container_name: airflow-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_ADDR: "http://0.0.0.0:8200"
    command: vault server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 📊 Monitoring
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki
    ports:
      - "3100:3100"
  
  statsd-exporter:
    image: prom/statsd-exporter
    ports:
      - "9102:9102"
      - "9125:9125/udp"

  # 📈 Superset
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    ports:
      - "8088:8088"
    depends_on:
      cloudsql-proxy:
        condition: service_healthy
    environment:
      SUPERSET_SQLALCHEMY_DATABASE_URI: ${SUPERSET_DB_CONN}
      SECRET_KEY: marwat_secret_77
    command: >
      bash -c "
      echo 'Waiting for CloudSQL Proxy...';
      for i in {1..20}; do
        python3 -c 'import socket; s = socket.socket(); s.connect((\"cloudsql-proxy\", 5432))' && break;
        sleep 2;
      done;
      superset db upgrade;
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true;
      superset init;
      superset run -h 0.0.0.0 -p 8088
      "

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: airflow-fluent-bit
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/opt/airflow/logs:ro
    depends_on:
      - loki
    user: "0:0"
    restart: always

  # 🚀 Airflow Base
  airflow-common: &airflow-common
    build: .
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW_RESULT_BACKEND}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: 'S_R_6hyp1PKFh3iP1N4OeunOCjCFnIuP41fEAtD64BA='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__SECRETS__BACKEND: airflow.providers.hashicorp.secrets.vault.VaultBackend
      AIRFLOW__SECRETS__BACKEND_KWARGS: '{"url": "http://vault:8200", "token": "${VAULT_TOKEN}"}'
      # Increase timeouts for slow Cloud SQL connections
      AIRFLOW__CORE__KILLED_TASK_CLEANUP_TIME: 604800
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: 1000
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 1000
      AIRFLOW__METRICS__STATSD_ON: "True"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
    depends_on:
      redis:
        condition: service_healthy
      cloudsql-proxy:
        condition: service_healthy

  # 🔧 Init DB
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for DB..."
        until airflow db check; do sleep 3; done
        airflow db migrate
        airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true

  # 🌐 Webserver
  airflow-webserver:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 500
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until airflow db check; do sleep 3; done
        exec /usr/bin/dumb-init -- /entrypoint webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
  # 🧠 Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ⚙️ Worker
  airflow-worker:
    <<: *airflow-common
    command: celery worker
    ports:
      - "8793:8793"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
