version: "3.8"

x-airflow-common: &airflow-common
  build: .
  user: "${AIRFLOW_UID:-5000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor

    # ---------------- DATABASE (Cloud SQL) ----------------
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${DB_PASSWORD}@34.69.30.163:5432/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${DB_PASSWORD}@34.69.30.163:5432/airflow

    # ---------------- CELERY ----------------
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://postgres:${DB_PASSWORD}@34.69.30.163:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0

    # ---------------- CORE ----------------
    AIRFLOW__CORE__FERNET_KEY: "S_R_6hyp1PKFh3iP1N4OeunOCjCFnIuP41fEAtD64BA="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # ---------------- ADMIN ----------------
    _AIRFLOW_WWW_USER_CREATE: "true"
    _AIRFLOW_WWW_USER_USERNAME: "admin"
    _AIRFLOW_WWW_USER_PASSWORD: "admin"

    # ---------------- VAULT ----------------
    AIRFLOW__SECRETS__BACKEND: airflow.providers.hashicorp.secrets.vault.VaultBackend
    AIRFLOW__SECRETS__BACKEND_KWARGS: '{"url": "http://vault:8200"}'

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
    - ./config:/opt/airflow/config

services:
  redis:
    image: redis:7
    restart: always

  vault:
    image: hashicorp/vault:1.13.3
    container_name: airflow-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
    command: server -dev -dev-root-token-id=root

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    # Use 'python3 -m airflow' to bypass any potential PATH issues
    command: >
      -c "
      python3 -m airflow db migrate &&
      python3 -m airflow users create \
        --username admin \
        --password admin \
        --role Admin \
        --email admin@example.com
      "

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    command: celery worker

volumes:
  postgres-db-volume:
