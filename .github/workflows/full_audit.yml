name: Full Repository Audit

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Match the cache key to the runner's OS and Python version
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Audit Tools
        run: |
          python -m pip install --upgrade pip
          # Using stubs and providers-google as seen in your successful log
          pip install pylint pyspark-stubs apache-airflow-providers-google

      - name: Configure Pylint
        run: |
          # Create a config to handle Airflow/Spark specific linting needs
          cat <<EOF > .pylintrc
          [MASTER]
          ignore=venv,tests,.github
          
          [MESSAGES CONTROL]
          # Disable common false positives for Airflow DAGs
          # C0114: Missing module docstring
          # C0116: Missing function docstring
          # W0611: Unused import (often triggered by airflow/spark plugins)
          disable=C0114,C0116,W0611,C0103
          
          [TYPECHECK]
          # Help pylint understand dynamic members in Spark/Airflow
          generated-members=pyspark.*,apache.airflow.*
          EOF

      - name: Run Pylint Audit
        run: |
          # Scans the repository and outputs the report
          # --exit-zero ensures the workflow completes even if lint errors exist
          pylint **/*.py --exit-zero

      - name: Security Scan
        run: |
          pip install bandit
          # Runs a security audit on the python source code
          bandit -r . -x ./tests
