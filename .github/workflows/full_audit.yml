name: Full Repository Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    name: Check All Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Critical for secret scanning history

      # 1. PYTHON CHECK (DAGs & Scripts)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Lint Python
        run: |
          python -m pip install --upgrade pip
          pip install pylint pyspark apache-airflow
          # This checks all .py files but ignores style warnings (C/R) to focus on bugs
          pylint $(git ls-files '*.py') --disable=C,R --errors-only

      # 2. TERRAFORM CHECK (Infra)
      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform fmt -check
          terraform validate

      # 3. DOCKER CHECK (Container Security)
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true # Scans Dockerfile and Dockerfile.superset

      # 4. YAML & CONFIG CHECK (Prometheus & Compose)
      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "."
          config_data: "{extends: default, rules: {line-length: disable}}"

      # 5. SECRET SCANNING (Prevent Password Leaks)
      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
