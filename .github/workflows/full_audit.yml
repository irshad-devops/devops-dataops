name: Full Repository Audit

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Optimization: Cache pip dependencies to speed up subsequent runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Audit Tools
        run: |
          python -m pip install --upgrade pip
          # We use stubs for Spark/Airflow to keep the runner light 
          # while still allowing Pylint to see the object definitions.
          pip install pylint pyspark-stubs apache-airflow-providers-google

      - name: Create Pylint Configuration
        run: |
          # Generates a hidden config to ignore common false positives in DAGs
          echo "[MASTER]" > .pylintrc
          echo "ignore=venv,tests" >> .pylintrc
          echo "[MESSAGES CONTROL]" >> .pylintrc
          echo "disable=C0114,C0115,C0116,W0611" >> .pylintrc

      - name: Run Pylint Audit
        run: |
          # This scans all Python files in the repo
          # The --exit-zero flag ensures the build doesn't "fail" 
          # if you just want to see the report first. 
          # Remove --exit-zero if you want to block merges on lint errors.
          pylint **/*.py --exit-zero

      - name: Security Scan (Optional)
        run: |
          pip install bandit
          bandit -r . -x ./tests
